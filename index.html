<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solution-cours-boostrap</title>
    <!-- BOOTSTRAP LINK -->

                        Bienvenue dans mon univers créatif

        </section>

        <section class=" bg-light py-4 ">

                    Mon expertise

                <h2>
                    Mon portfolio
                </h2>
                <p>
                    Projets perso et pro
                </p>
                <div class="row justify-content-between  gy-4 gy-md-0 ">
                    <div class="col-12 col-md-2">
                    <div class=" bg-secondary " style="height: 100px;"></div> 
                    </div>

                    <div class="col-12 col-md-3">

                    </div>

                    <div class="col-12 col-md-3">

                    </div>

                    <div class="col-12 col-md-3">
                        <div class=" bg-secondary " style="height: 100px;"></div>

        </section>

            <div class="container ">
                <h2>
                    Un Projets de création web ?
                </h2>
                <p>
                    Allons en discter autour d'un café
                </p>
                <div class="row py-3 py-md-0 gy-3 gy-md-0 ">
                    <div class="col-12 col-md-5 px-md-0">
                        <img src="public/img/grab-a-coffee.jpg" alt="café" class="img-fluid">
                    </div>

                    <div class="col-12 col-md-6 offset-md-1 px-md-0">

                    </div>
                </div>

        <div class="container py-md-0 ">
            <div class="row justify-content-between gy-4 ">

                <div class="col-12 col-md-3">
                    <div class=" bg-secondary " style="height: 100px;"></div>
